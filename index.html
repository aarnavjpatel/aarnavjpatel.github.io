<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarnav Patel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #f1f5f9;
            text-align: center;
        }
        header {
            padding: 40px;
            background: #1e293b;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        p {
            color: #94a3b8;
        }
        .container {
            padding: 40px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 12px;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #2563eb;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9em;
            color: #64748b;
        }
    </style>
</head>
<body>

<header>
    <h1>Aarnav Patel</h1>
    <p>Welcome to my GitHub Pages website 🚀</p>
</header>

<div class="container">
    <div class="card">
        <h2>My Repository</h2>
        <p>View my GitHub project and code.</p>
        <a href="https://github.com/aarnavjpatel/aarnavpatel.github.io" target="_blank">
            View Repo
        </a>
    </div>

    <div class="card">
        <h2>Repository Settings</h2>
        <p>Manage repository configuration.</p>
        <a href="https://github.com/aarnavjpatel/aarnavpatel.github.io/settings" target="_blank">
            Open Settings
        </a>
    </div>
</div>

<footer>
    © 2026 Aarnav Patel | Built with GitHub Pages
</footer>

</body>
</html>
